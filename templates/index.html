<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Powered by Dify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ frontend_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/katex/katex.min.css') }}">
</head>
<body data-theme="dark">
    <div id="loginScreen" class="login-screen login-screen--hidden" aria-live="polite">
        <div class="login-screen-panel">
            <div class="login-screen-copy">
                <span class="login-screen-title">A Level</span>
                <span class="login-screen-subtitle">Assistant</span>
            </div>
            <p id="loginScreenMessage" class="login-screen-message login-screen-message--hidden"></p>
            <a id="loginScreenGoogleBtn" class="sidebar-capsule sidebar-capsule--auth sidebar-capsule--clickable auth-google-capsule auth-google-capsule--hero" href="/auth/google">
                <span class="auth-google-capsule-label">Google 登录</span>
            </a>
        </div>
    </div>
    <div class="app-container">
        <div class="sidebar-dock">
            <div class="sidebar-dock-main">
                <div class="shell-rail" aria-label="主导航">
                    <button class="shell-rail-btn" id="sidebarCollapseBtn" type="button" onclick="toggleDesktopSidebar()" title="收起侧边栏" aria-label="收起侧边栏">
                        <svg class="shell-rail-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                            <path d="M15 18l-6-6 6-6"></path>
                        </svg>
                    </button>
                    <button class="shell-rail-btn shell-rail-btn--accent" type="button" onclick="startNewChat()" title="新对话" aria-label="新对话">
                        <span class="shell-rail-plus">+</span>
                    </button>
                    <button class="shell-rail-btn theme-toggle-rail-btn" id="themeToggleBtn" type="button" onclick="toggleTheme()" title="切换主题" aria-label="切换主题">
                        <span class="theme-toggle-icon">☀</span>
                    </button>
                </div>

                <aside class="sidebar">
                    <div id="sidebarStatus" class="sidebar-status sidebar-status--hidden" aria-live="polite"></div>
                    <div class="conversations-list">
                        <div id="conversationsList" class="conversations-container">
                            <div class="empty-state">还没有会话</div>
                        </div>
                    </div>
                    <div class="sidebar-dock-foot">
                        <div id="authPanel" class="auth-panel auth-panel--hidden" aria-live="polite"></div>
                    </div>
                </aside>
            </div>
        </div>

        <main class="main-content">
            <header class="main-chrome">
                <div class="main-chrome-brand">
                    <div class="logo logo--compact">
                        <span class="logo-icon">✦</span>
                        <div class="logo-copy">
                            <span class="logo-text">A Level</span>
                            <span class="logo-subtext">Assistant</span>
                        </div>
                    </div>
                </div>
                <h1 class="main-chrome-title" id="currentSourceTitle">选择知识库</h1>
                <div class="main-chrome-spacer" aria-hidden="true"></div>
            </header>

            <div class="chat-container">
                <div id="messagesArea" class="messages-area">
                    <div class="welcome-section">
                        <div class="welcome-orb">
                            <span class="welcome-orb-core"></span>
                            <span class="welcome-orb-ring welcome-orb-ring-one"></span>
                            <span class="welcome-orb-ring welcome-orb-ring-two"></span>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-box-container">
                        <div id="uploadedFiles" class="uploaded-files"></div>
                        <button class="attach-btn" id="fileUploadBtn" type="button" onclick="document.getElementById('fileInput').click()" title="上传图片">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
                        <textarea
                            id="messageInput"
                            class="message-input"
                            placeholder="输入问题… (Shift+Enter 换行，连按两次 Enter 发送)"
                            onkeydown="handleInputKeydown(event)"
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <select id="sourceSelect" class="source-select-inline" onchange="onSourceChange()" title="选择知识库">
                                <option value="">选择知识库</option>
                            </select>
                            <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()" title="发送">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="app-meta">
                        <span class="footer-version">Made by Ray zhang (v{{ frontend_version }})</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='vendor/katex/katex.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/purify.min.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}?v={{ frontend_version }}"></script>
</body>
</html>
