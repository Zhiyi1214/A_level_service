<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no">
    <title>AI Assistant - Powered by Dify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ asset_tag }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/katex/katex.min.css') }}">
</head>
<body data-theme="dark">
    <div id="loginScreen" class="login-screen login-screen--hidden" aria-live="polite">
        <div class="login-screen-hero" aria-label="A星，A Level Assistant">
            <div class="login-screen-hero-brand-wrap">
                <div class="login-screen-brand-cluster">
                    <div class="login-screen-brand-a" aria-hidden="true">
                        <span class="login-screen-brand-a-inner">
                            <span class="login-screen-brand-a-letter">A</span>
                            <span class="login-screen-brand-a-star" aria-hidden="true">*</span>
                        </span>
                        <div class="login-screen-brand-words">
                            <div class="login-screen-brand-rotate" aria-hidden="true">
                                <span class="login-screen-brand-line login-screen-brand-line--visible">level</span>
                                <span class="login-screen-brand-line login-screen-brand-line--em">I</span>
                                <span class="login-screen-brand-line">ssistant</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="login-screen-actions">
                <p id="loginScreenMessage" class="login-screen-message login-screen-message--hidden"></p>
                <div class="login-screen-button-stack" role="group" aria-label="登录方式">
                    <a id="loginScreenGoogleBtn" class="sidebar-capsule sidebar-capsule--auth sidebar-capsule--clickable auth-google-capsule auth-google-capsule--hero login-screen-oauth-btn login-auth-hidden" href="/auth/google">
                        <span class="auth-google-capsule-label">Google 登录</span>
                    </a>
                    <div id="loginScreenEmailBlock" class="login-screen-email-block login-auth-hidden" aria-label="邮箱验证码登录">
                        <input type="email" id="loginEmailInput" class="login-screen-input" placeholder="邮箱" autocomplete="email" inputmode="email" />
                        <div class="login-screen-email-row">
                            <button type="button" id="loginEmailSendBtn" class="login-screen-btn login-screen-btn--primary">发送验证码</button>
                        </div>
                        <input type="text" id="loginEmailCodeInput" class="login-screen-input" placeholder="6 位验证码" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
                        <button type="button" id="loginEmailVerifyBtn" class="login-screen-btn">邮箱登录</button>
                        <p id="loginEmailMessage" class="login-screen-email-message login-screen-message--hidden"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="app-container">
        <div class="sidebar-dock">
            <div class="sidebar-dock-main">
                <div class="shell-rail" aria-label="主导航">
                    <button class="shell-rail-btn" id="sidebarCollapseBtn" type="button" onclick="toggleDesktopSidebar()" title="收起侧边栏" aria-label="收起侧边栏">
                        <svg class="shell-rail-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                            <path d="M15 18l-6-6 6-6"></path>
                        </svg>
                    </button>
                    <button class="shell-rail-btn shell-rail-btn--accent" type="button" onclick="startNewChat()" title="新对话" aria-label="新对话">
                        <span class="shell-rail-plus">+</span>
                    </button>
                    <button class="shell-rail-btn theme-toggle-rail-btn" id="themeToggleBtn" type="button" onclick="toggleTheme()" title="切换主题" aria-label="切换主题">
                        <span class="theme-toggle-icon" aria-hidden="true"></span>
                    </button>
                </div>

                <aside class="sidebar">
                    <div id="sidebarStatus" class="sidebar-status sidebar-status--hidden" aria-live="polite"></div>
                    <div class="conversations-list">
                        <div id="conversationsList" class="conversations-container">
                            <div class="empty-state">还没有会话</div>
                        </div>
                    </div>
                    <div class="sidebar-dock-foot">
                        <div id="authPanel" class="auth-panel auth-panel--hidden" aria-live="polite"></div>
                    </div>
                </aside>
            </div>
        </div>

        <main class="main-content">
            <header class="main-chrome">
                <button class="shell-rail-btn main-chrome-rail-toggle" id="sidebarCollapseBtnMobile" type="button" onclick="toggleDesktopSidebar()" title="打开会话列表" aria-label="打开会话列表">
                    <svg class="shell-rail-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                        <path d="M15 18l-6-6 6-6"></path>
                    </svg>
                </button>
                <div class="main-chrome-rail-trailing" aria-label="快捷操作">
                    <button class="shell-rail-btn shell-rail-btn--accent" type="button" onclick="startNewChat()" title="新对话" aria-label="新对话">
                        <span class="shell-rail-plus">+</span>
                    </button>
                    <button class="shell-rail-btn theme-toggle-rail-btn" type="button" onclick="toggleTheme()" title="切换主题" aria-label="切换主题">
                        <span class="theme-toggle-icon" aria-hidden="true"></span>
                    </button>
                </div>
                <div class="main-chrome-brand">
                    <div class="logo logo--compact logo--header-brand" aria-label="A Level Assistant">
                        <span class="app-brand-mark app-brand-mark--header" aria-hidden="true">
                            <span class="app-brand-mark-inner">
                                <span class="app-brand-mark-letter">A</span>
                                <span class="app-brand-mark-star">*</span>
                            </span>
                        </span>
                    </div>
                </div>
                <h1 class="main-chrome-title" id="currentSourceTitle">请选择知识库</h1>
                <div class="main-chrome-spacer" aria-hidden="true"></div>
            </header>

            <div class="chat-container" id="chatContainer">
                <div id="messagesArea" class="messages-area" role="log" aria-live="polite"></div>

                <div class="composer-dock" id="composerDock">
                    <div class="empty-composer-greeting" id="emptyComposerGreeting" aria-hidden="true">
                        <p class="empty-composer-greeting-line1" id="emptyComposerGreetingLine1"></p>
                        <p class="empty-composer-greeting-line2">你可以问我任何 A-level 问题</p>
                    </div>
                    <div class="input-area">
                    <div class="input-box-container">
                        <div id="uploadedFiles" class="uploaded-files"></div>
                        <button class="attach-btn" id="fileUploadBtn" type="button" onclick="document.getElementById('fileInput').click()" title="上传图片">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
                        <textarea
                            id="messageInput"
                            class="message-input"
                            placeholder="请输入问题"
                            onkeydown="handleInputKeydown(event)"
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <div class="source-select-wrap" id="sourceSelectWrap">
                                <select id="sourceSelect" class="source-select-inline" onchange="onSourceChange()" title="请选择知识库">
                                    <option value="">请选择知识库</option>
                                </select>
                                <button type="button" class="source-select-lock-hitbox" id="sourceSelectLockHitbox" hidden
                                    aria-label="左上角新建聊天即可切换知识库"></button>
                            </div>
                            <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()" title="发送">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="app-meta">
                        <span class="footer-version">Made by Zhiyi zhang Beta (v{{ frontend_version }})</span>
                    </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='vendor/katex/katex.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/marked-katex-extension.umd.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/purify.min.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}?v={{ asset_tag }}"></script>
</body>
</html>
