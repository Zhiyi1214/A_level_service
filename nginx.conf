user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    upstream backend {
        server ai-assistant:8000;
    }

    # 仅在「直连 Nginx 的 TCP 客户端」属于 Cloudflare 官方网段时，才用 CF-Connecting-IP 重写 $remote_addr。
    # 直连源站并伪造 CF-Connecting-IP 时，对端 IP 不在白名单，$remote_addr 保持为真实连接方，无法骗过后端限流。
    # 列表见 https://www.cloudflare.com/ips/ ，请定期更新 nginx.cloudflare-realip.conf。
    include /etc/nginx/nginx.cloudflare-realip.conf;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # 若仅用 Cloudflare Tunnel：到 Nginx 的最后一跳往往是本机/Docker 内网 IP，不在上述 CF 网段。
    # 此时需额外 set_real_ip_from 收紧到 cloudflared 所在网段或固定 IP，否则 $remote_addr 不会是访客真实 IP。

    # 主服务 — Cloudflare Tunnel 通过 HTTP 连入，TLS 由 Cloudflare 边缘处理
    server {
        listen 80;
        server_name _;
        charset utf-8;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # 首页 HTML 勿长期缓存，否则仍引用旧的 ?v= 链接
        location = / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_http_version 1.1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        }

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # 附件不再经 Nginx 直连 MinIO；由后端 /api/media 鉴权后从桶流式输出，避免匿名越权拉取。

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_cache_valid 200 1d;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # 流式对话：禁用缓冲，延长读超时
        location = /api/chat {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            chunked_transfer_encoding on;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }
}
